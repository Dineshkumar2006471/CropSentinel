name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-lint-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt ruff mypy

    - name: Run Ruff Linter
      run: ruff check backend/ --ignore E501

    - name: Run MyPy Type Checker
      run: mypy backend/main.py --ignore-missing-imports

    - name: Run PyTest
      run: pytest backend/test_main.py -v

  frontend-lint-and-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      run: |
        cd frontend
        npm ci

    - name: Run Linter (Oxlint)
      run: |
        cd frontend
        npm run lint

    - name: Build Frontend (Strict TypeScript check)
      run: |
        cd frontend
        npm run build
